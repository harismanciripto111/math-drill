<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Drill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>Math Drill</h1>
      <div class="streak-box">
        <span class="streak-ico">🔥</span>
        <span id="streak-count">0</span>
        <span class="streak-label">hari streak</span>
      </div>
    </header>

    <section class="stats-bar">
      <div class="stat"><span class="stat-val" id="stat-sessions">0</span><span class="stat-lbl">Sesi</span></div>
      <div class="stat"><span class="stat-val" id="stat-correct">0</span><span class="stat-lbl">Benar</span></div>
      <div class="stat"><span class="stat-val" id="stat-accuracy">0%</span><span class="stat-lbl">Akurasi</span></div>
      <div class="stat"><span class="stat-val" id="stat-streak">0</span><span class="stat-lbl">Streak</span></div>
    </section>

    <section class="timer-section">
      <div id="timer-label" class="timer-label">Sesi Kerja</div>
      <div id="timer-display" class="timer-display">25:00</div>
      <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar"></div></div>
    </section>

    <section class="controls-section">
      <div class="ops-group">
        <label><input type="checkbox" value="add" checked /> Tambah (+)</label>
        <label><input type="checkbox" value="sub" checked /> Kurang (-)</label>
        <label><input type="checkbox" value="mul" /> Kali (×)</label>
        <label><input type="checkbox" value="div" /> Bagi (÷)</label>
      </div>
      <div class="level-group">
        <button class="level-btn active" data-level="easy">Mudah</button>
        <button class="level-btn" data-level="medium">Sedang</button>
        <button class="level-btn" data-level="hard">Susah</button>
      </div>
    </section>

    <section id="drill-area" class="drill-area hidden">
      <div id="question-card" class="question-card">
        <div id="question-text" class="question-text">?</div>
        <input id="answer-input" class="answer-input" type="number" placeholder="Jawaban..." autocomplete="off" />
        <button id="btn-submit" class="btn btn-submit">Cek →</button>
        <div id="feedback" class="feedback"></div>
      </div>
      <div class="session-score">Benar sesi ini: <span id="session-score">0</span> / <span id="session-total">0</span></div>
    </section>

    <div class="btn-row">
      <button id="btn-start" class="btn btn-primary">Mulai Sesi</button>
      <button id="btn-pause" class="btn btn-secondary hidden">Jeda</button>
      <button id="btn-reset" class="btn btn-danger">Reset</button>
    </div>
  </div>

  <!-- Break Modal -->
  <div id="break-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Waktu Istirahat!</h2>
      <p>Sesi selesai. Istirahat <span id="break-countdown">5:00</span></p>
      <div class="timer-bar-wrap"><div id="break-bar" class="timer-bar break-bar"></div></div>
      <div class="modal-btns">
        <button id="btn-continue" class="btn btn-primary">Lanjut Sesi Berikutnya</button>
        <button id="btn-stop" class="btn btn-danger">Stop, Udah Cukup</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="splash-cursor.js"></script>
</body>
</html>
